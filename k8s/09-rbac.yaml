apiVersion: v1
kind: ServiceAccount
metadata:
  name: banking-api-sa
  namespace: banking
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: banking-dashboard-sa
  namespace: banking
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: banking-api-role
  namespace: banking
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: banking-api-binding
  namespace: banking
subjects:
- kind: ServiceAccount
  name: banking-api-sa
  namespace: banking
roleRef:
  kind: Role
  name: banking-api-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: banking-dashboard-role
  namespace: banking
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: banking-dashboard-binding
  namespace: banking
subjects:
- kind: ServiceAccount
  name: banking-dashboard-sa
  namespace: banking
roleRef:
  kind: Role
  name: banking-dashboard-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer-readonly-role
  namespace: banking
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-readonly-binding
  namespace: banking
subjects:
- kind: User
  name: developer
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: developer-readonly-role
  apiGroup: rbac.authorization.k8s.io